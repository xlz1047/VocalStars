version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.backend
    volumes:
      - ./:/app
    env_file:
      - .env
    ports:
      - 8000:8000
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    volumes:
      - ./frontend:/app
    env_file:
      - .env
    ports:
      - 3000:3000
    depends_on:
      - backend

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: vocalstars
      POSTGRES_PASSWORD: vocalstars
      POSTGRES_DB: vocalstars
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - 5432:5432

volumes:
  db_data:
